<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오병훈 - 실시간 대시보드 포트폴리오</title>
    <style>
        body {
            font-family: 'Pretendard', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
            background-color: #f4f7f6;
            line-height: 1.6;
        }
        header {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 4rem 1rem;
        }
        header h1 {
            margin: 0;
            font-size: 2.5rem;
        }
        header p {
            font-size: 1.1rem;
            margin-top: 10px;
            font-weight: 300;
            opacity: 0.9;
        }
        .container {
            max-width: 900px;
            margin: -40px auto 0;
            padding: 0 2rem;
            position: relative;
        }
        section {
            background: white;
            padding: 2rem;
            margin-bottom: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        h2 {
            color: #2c3e50;
            border-bottom: 3px solid #3498db;
            display: inline-block;
            padding-bottom: 8px;
            margin-top: 0;
        }
        /* 위젯 컨테이너 스타일 */
        .widget-box {
            margin-top: 1.5rem;
            margin-bottom: 2rem;
            height: 400px; /* 차트 높이 지정 */
            border: 1px solid #eef0f2;
            border-radius: 8px;
            overflow: hidden;
        }
        footer {
            text-align: center;
            padding: 2rem;
            background-color: #2c3e50;
            color: #95a5a6;
            margin-top: 3rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>안녕하세요, 오병훈입니다</h1>
        <p>개발 프로젝트 및 실시간 금융 대시보드</p>
    </header>

    <div class="container">
        
        <!-- 금융 대시보드 섹션 (추가된 부분) -->
        <section id="dashboard">
            <h2>📈 실시간 금융 대시보드</h2>
            <p>달러-원 환율, 주요 국채 금리, 그리고 코스피(KOSPI) 실시간 차트입니다.</p>

            <!-- 1. 환율 및 금리 오버뷰 위젯 -->
            <h3>환율 & 금리 (USD/KRW, 10년물 국채)</h3>
            <div class="widget-box" style="height: 350px;">
                <!-- TradingView Widget BEGIN -->
                <div class="tradingview-widget-container">
                  <div class="tradingview-widget-container__widget"></div>
                  <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
                  {
                  "colorTheme": "light",
                  "dateRange": "12M",
                  "showChart": true,
                  "locale": "kr",
                  "width": "100%",
                  "height": "100%",
                  "largeChartUrl": "",
                  "isTransparent": true,
                  "showSymbolLogo": true,
                  "showFloatingTooltip": false,
                  "tabs": [
                    {
                      "title": "환율 및 금리",
                      "symbols": [
                        { "s": "FX_IDC:USDKRW", "d": "달러/원 환율 (USD/KRW)" },
                        { "s": "TVC:US10Y", "d": "미국 10년물 국채 금리" },
                        { "s": "TVC:KR10Y", "d": "한국 10년물 국채 금리" }
                      ]
                    }
                  ]
                }
                  </script>
                </div>
                <!-- TradingView Widget END -->
            </div>

            <!-- 2. 코스피 실시간 인터랙티브 차트 위젯 -->
            <h3>코스피 (KOSPI) 종합주가지수</h3>
            <div class="widget-box" style="height: 500px;">
                <!-- TradingView Widget BEGIN -->
                <div class="tradingview-widget-container">
                  <div id="tradingview_kospi" style="height: 100%;"></div>
                  <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                  <script type="text/javascript">
                  new TradingView.widget(
                  {
                  "autosize": true,
                  "symbol": "KRX:KOSPI",
                  "interval": "D",
                  "timezone": "Asia/Seoul",
                  "theme": "light",
                  "style": "1", /* 1: 캔들차트, 2: 선차트 */
                  "locale": "kr",
                  "enable_publishing": false,
                  "backgroundColor": "rgba(255, 255, 255, 1)",
                  "hide_top_toolbar": false,
                  "hide_legend": false,
                  "save_image": false,
                  "container_id": "tradingview_kospi"
                }
                  );
                  </script>
                </div>
                <!-- TradingView Widget END -->
            </div>
        </section>

        <!-- 기존 자기소개 섹션 -->
        <section id="about">
            <h2>About Me</h2>
            <p>클라우드 환경 및 새로운 IT 기술, 그리고 금융 시장 동향에 관심을 가지고 있는 개발자입니다.</p>
        </section>

    </div>

    <footer>
        <p>&copy; 2026 오병훈. All rights reserved.</p>
    </footer>

</body>
</html>
