<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오병훈 - 실시간 대시보드 포트폴리오</title>
    <style>
        :root {
            --bg: #f6f7fb;
            --ink: #1b2230;
            --ink-soft: #5b6472;
            --navy: #10192e;
            --navy-soft: #1c2740;
            --accent: #4f7cff;
            --accent-soft: #eef2ff;
            --line: #e7e9f0;
            --card-shadow: 0 20px 45px -20px rgba(16, 25, 46, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', 'Segoe UI', 'Noto Sans KR', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            color: var(--ink);
            background-color: var(--bg);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        header {
            position: relative;
            background:
                radial-gradient(circle at 15% 20%, rgba(79, 124, 255, 0.35), transparent 45%),
                radial-gradient(circle at 85% 0%, rgba(120, 200, 255, 0.2), transparent 40%),
                linear-gradient(160deg, var(--navy) 0%, var(--navy-soft) 100%);
            color: white;
            text-align: center;
            padding: 5.5rem 1.5rem 7rem;
            overflow: hidden;
        }

        header .eyebrow {
            display: inline-block;
            font-size: 0.8rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            font-weight: 600;
            color: #9db4ff;
            margin-bottom: 1.1rem;
        }

        header h1 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 2.8rem);
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        header p {
            font-size: 1.05rem;
            margin: 0.9rem auto 0;
            font-weight: 300;
            opacity: 0.85;
            max-width: 460px;
        }

        .container {
            max-width: 900px;
            margin: -64px auto 0;
            padding: 0 1.5rem 2rem;
            position: relative;
        }

        section {
            background: white;
            padding: 2.25rem 2.25rem 2.5rem;
            margin-bottom: 1.75rem;
            border-radius: 18px;
            border: 1px solid var(--line);
            box-shadow: var(--card-shadow);
        }

        .section-head {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 0.4rem;
        }

        h2 {
            color: var(--ink);
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            margin: 0;
        }

        .section-head .icon {
            font-size: 1.3rem;
        }

        section > p {
            color: var(--ink-soft);
            margin-top: 0.5rem;
            margin-bottom: 0;
        }

        h3 {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--ink-soft);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin: 2rem 0 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        h3::before {
            content: "";
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
        }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.72rem;
            font-weight: 600;
            color: #16a34a;
            background: #ecfdf3;
            border: 1px solid #bbf3cf;
            padding: 0.25rem 0.6rem;
            border-radius: 999px;
            margin-left: auto;
        }

        .live-badge .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #16a34a;
            box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.6);
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.5); }
            70% { box-shadow: 0 0 0 7px rgba(22, 163, 74, 0); }
            100% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0); }
        }

        .widget-box {
            margin-top: 0.25rem;
            height: 400px;
            border: 1px solid var(--line);
            border-radius: 12px;
            overflow: hidden;
            background: #fafbfd;
        }

        footer {
            text-align: center;
            padding: 2.5rem 1.5rem;
            background-color: var(--navy);
            color: #8b93a7;
            font-size: 0.85rem;
        }

        footer p {
            margin: 0;
        }

        @media (max-width: 600px) {
            header {
                padding: 4rem 1.25rem 6rem;
            }
            section {
                padding: 1.75rem 1.4rem 2rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <span class="eyebrow">Portfolio &middot; Dashboard</span>
        <h1>안녕하세요, 오병훈입니다</h1>
        <p>개발 프로젝트 및 실시간 금융 대시보드</p>
    </header>

    <div class="container">

        <!-- 금융 대시보드 섹션 -->
        <section id="dashboard">
            <div class="section-head">
                <span class="icon">📈</span>
                <h2>실시간 금융 대시보드</h2>
                <span class="live-badge"><span class="dot"></span>LIVE</span>
            </div>
            <p>달러-원 환율, 주요 국채 금리, 그리고 코스피(KOSPI) 실시간 차트입니다.</p>

            <!-- 1. 환율 및 금리 오버뷰 위젯 -->
            <h3>환율 &amp; 금리 (USD/KRW, 10년물 국채)</h3>
            <div class="widget-box" style="height: 350px;">
                <!-- TradingView Widget BEGIN -->
                <div class="tradingview-widget-container">
                  <div class="tradingview-widget-container__widget"></div>
                  <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
                  {
                  "colorTheme": "light",
                  "dateRange": "12M",
                  "showChart": true,
                  "locale": "kr",
                  "width": "100%",
                  "height": "100%",
                  "largeChartUrl": "",
                  "isTransparent": true,
                  "showSymbolLogo": true,
                  "showFloatingTooltip": false,
                  "tabs": [
                    {
                      "title": "환율 및 금리",
                      "symbols": [
                        { "s": "FX_IDC:USDKRW", "d": "달러/원 환율 (USD/KRW)" },
                        { "s": "TVC:US10Y", "d": "미국 10년물 국채 금리" },
                        { "s": "TVC:KR10Y", "d": "한국 10년물 국채 금리" }
                      ]
                    }
                  ]
                }
                  </script>
                </div>
                <!-- TradingView Widget END -->
            </div>

            <!-- 2. 코스피 실시간 인터랙티브 차트 위젯 -->
            <h3>코스피 (KOSPI) 종합주가지수</h3>
            <div class="widget-box" style="height: 500px;">
                <!-- TradingView Widget BEGIN -->
                <div class="tradingview-widget-container">
                  <div id="tradingview_kospi" style="height: 100%;"></div>
                  <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                  <script type="text/javascript">
                  new TradingView.widget(
                  {
                  "autosize": true,
                  "symbol": "KRX:KOSPI",
                  "interval": "D",
                  "timezone": "Asia/Seoul",
                  "theme": "light",
                  "style": "1", /* 1: 캔들차트, 2: 선차트 */
                  "locale": "kr",
                  "enable_publishing": false,
                  "backgroundColor": "rgba(255, 255, 255, 1)",
                  "hide_top_toolbar": false,
                  "hide_legend": false,
                  "save_image": false,
                  "container_id": "tradingview_kospi"
                }
                  );
                  </script>
                </div>
                <!-- TradingView Widget END -->
            </div>
        </section>

        <!-- 기존 자기소개 섹션 -->
        <section id="about">
            <div class="section-head">
                <span class="icon">🙋</span>
                <h2>About Me</h2>
            </div>
            <p>클라우드 환경 및 새로운 IT 기술, 그리고 금융 시장 동향에 관심을 가지고 있는 개발자입니다.</p>
        </section>

    </div>

    <footer>
        <p>&copy; 2026 오병훈. All rights reserved.</p>
    </footer>

</body>
</html>
